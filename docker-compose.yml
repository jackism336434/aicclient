version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpass
      POSTGRES_DB: bookmanagement
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./book-management-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://bookuser:bookpass@postgres:5432/bookmanagement
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./book-management-backend:/app

  frontend:
    build: ./book-management-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: